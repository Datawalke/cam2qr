# GitHub Pages deploy for the static site in site/. Lives in docs/ because
# automated sessions cannot push workflow files; move it into place with:
#   git mv docs/pages-workflow.yml .github/workflows/pages.yml
#
# One-time repo setting: Settings -> Pages -> Source: "GitHub Actions".
# The site has no build step; it deploys the site/ directory as-is.

name: Deploy site

on:
  push:
    branches: [main]
    paths: ['site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
